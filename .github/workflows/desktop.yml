name: desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            bundles: dmg
          - os: ubuntu-22.04
            platform: linux-x64
            bundles: appimage,deb
          - os: windows-latest
            platform: windows-x64
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webkit dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libxdo-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Python runtime tarball
        uses: actions/cache@v4
        with:
          path: desktop/.runtime_cache
          key: pbs-${{ matrix.platform }}-${{ hashFiles('desktop/scripts/bundle_runtime.sh') }}

      - name: Embed relay runtime
        shell: bash
        run: desktop/scripts/bundle_runtime.sh ${{ matrix.platform }}

      - name: Install Tauri CLI
        working-directory: desktop
        run: npm ci

      - name: Build installers
        working-directory: desktop
        run: |
          node scripts/check_runtime.mjs
          npx tauri build --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: airelays-desktop-${{ matrix.platform }}
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
