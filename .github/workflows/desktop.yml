name: desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The desktop installers bundle the relay from this checkout, so a
  # desktop release must ship the exact relay version PyPI has: the
  # desktop-vX.Y.Z tag, the desktop manifests, and pyproject.toml must
  # all agree before anything builds.
  version-guard:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check desktop tag matches relay and desktop versions
        id: check
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import tomllib
          from pathlib import Path

          ref = os.environ.get("GITHUB_REF_NAME", "")
          match = re.fullmatch(r"desktop-v(\d+\.\d+\.\d+(?:[a-zA-Z0-9.-]+)?)", ref)
          if not match:
              raise SystemExit(f"Unexpected desktop tag: {ref!r}")
          version = match.group(1)

          # Canonical sources: src/airelay/__init__.py (relay; pyproject is
          # dynamic) and desktop/src-tauri/Cargo.toml (desktop; tauri.conf
          # inherits it). package.json mirrors the desktop version.
          init_text = Path("src/airelay/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__ = "([^"]+)"', init_text, re.M)
          if not match:
              raise SystemExit("src/airelay/__init__.py has no __version__")
          relay_version = match.group(1)
          cargo = tomllib.loads(Path("desktop/src-tauri/Cargo.toml").read_text(encoding="utf-8"))
          package = json.loads(Path("desktop/package.json").read_text(encoding="utf-8"))

          versions = {
              "tag": version,
              "airelay.__version__": relay_version,
              "Cargo.toml": cargo["package"]["version"],
              "package.json": package["version"],
          }
          tauri = json.loads(Path("desktop/src-tauri/tauri.conf.json").read_text(encoding="utf-8"))
          if "version" in tauri:
              versions["tauri.conf.json"] = tauri["version"]
          if len(set(versions.values())) != 1:
              raise SystemExit(f"Version mismatch: {versions}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              print(f"version={version}", file=fh)
          PY

  build:
    needs: [version-guard]
    if: always() && (needs.version-guard.result == 'success' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            bundles: dmg
          - os: ubuntu-22.04
            platform: linux-x64
            bundles: appimage,deb
          - os: windows-latest
            platform: windows-x64
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webkit dependencies
        if: startsWith(matrix.os, 'ubuntu')
        # libfuse2 lets the linuxdeploy AppImage tooling execute on runners
        # without FUSE set up.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libxdo-dev librsvg2-dev patchelf libgtk-3-dev libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Python runtime tarball
        uses: actions/cache@v4
        with:
          path: desktop/.runtime_cache
          key: pbs-${{ matrix.platform }}-${{ hashFiles('desktop/scripts/bundle_runtime.sh') }}

      - name: Embed relay runtime
        shell: bash
        run: desktop/scripts/bundle_runtime.sh ${{ matrix.platform }}

      - name: Install Tauri CLI
        working-directory: desktop
        run: npm ci

      - name: Build installers
        working-directory: desktop
        env:
          # linuxdeploy re-strips every bundled library and fails on the
          # embedded CPython runtime's shared objects; the Rust binary is
          # already stripped by the release profile.
          NO_STRIP: "true"
        run: |
          node scripts/check_runtime.mjs
          npx tauri build --verbose --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: airelays-desktop-${{ matrix.platform }}
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  # Attach the installers to the same vX.Y.Z GitHub Release the relay
  # publishes to, keeping GitHub and PyPI in sync: one version, one
  # release page carrying both the Python distributions and the desktop
  # installers.
  attach-to-release:
    if: github.event_name == 'push'
    needs: [version-guard, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: airelays-desktop-*
          path: installers
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-guard.outputs.version }}
          files: |
            installers/**/*.dmg
            installers/**/*.exe
            installers/**/*.AppImage
            installers/**/*.deb
          fail_on_unmatched_files: true
